<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>足球阵容</title>
<style>
body { margin:0; font-family:Arial; background:#0b3d0b; color:white; text-align:center;}
.nav { background:black; padding:10px; }
.select { cursor:pointer; padding:10px; }
.pitch { position:relative; width:360px; height:520px; background:#0a5c0a; border:2px solid #fff; border-radius:15px; margin:20px auto; }

.player {
 position:absolute;
 transform:translate(-50%,-50%);
 width:60px;
 height:60px;
 border-radius:50%;
 background:#00ffcc;
 color:black;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:12px;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">⚽ 足球阵容演示</div>

<div class="select" onclick="showTeam('a')">阿根廷</div>
<div class="select" onclick="showTeam('b')">法国</div>

<div id="pitch" class="pitch"></div>

<script>

const teams = {
  a: [
    {name:'梅西',x:50,y:20},
    {name:'迪马利亚',x:20,y:30},
    {name:'劳塔罗',x:80,y:30},
    {name:'恩佐',x:50,y:50},
    {name:'德保罗',x:30,y:60},
    {name:'麦卡利斯特',x:70,y:60},
    {name:'后卫1',x:20,y:75},
    {name:'后卫2',x:40,y:80},
    {name:'后卫3',x:60,y:80},
    {name:'后卫4',x:80,y:75},
    {name:'门将',x:50,y:92}
  ],
  b: [
    {name:'姆巴佩',x:50,y:20},
    {name:'登贝莱',x:20,y:30},
    {name:'吉鲁',x:80,y:30},
    {name:'格列兹曼',x:50,y:50},
    {name:'琼阿梅尼',x:30,y:60},
    {name:'拉比奥',x:70,y:60},
    {name:'后卫A',x:20,y:75},
    {name:'后卫B',x:40,y:80},
    {name:'后卫C',x:60,y:80},
    {name:'后卫D',x:80,y:75},
    {name:'门将',x:50,y:92}
  ]
};

function showTeam(key){
  const pitch = document.getElementById("pitch");
  pitch.innerHTML = "";

  teams[key].forEach(p=>{
    const div = document.createElement("div");
    div.className = "player";
    div.style.left = p.x + "%";
    div.style.top = p.y + "%";
    div.innerText = p.name;
    div.onclick = ()=>alert(p.name);
    pitch.appendChild(div);
  });
}

// 默认显示
showTeam('a');

</script>

</body>
</html>
